agents:
  voice_support:
    name: "Voice Support Agent"
    channel: voice
    llm_provider: openai
    llm_model: gpt-4o-mini
    temperature: 0.3
    max_tokens: 512
    containment_target: 0.75
    llm:
      top_p: 0.9
      top_k: 40
      frequency_penalty: 0.3
      presence_penalty: 0.1
      n: 1
      stop_sequences: ["\n\nUser:", "Human:"]
      chain_of_thought: false
      few_shot_enabled: false
    tools:
      - lookup_customer
      - search_knowledge_base
      - create_ticket
      - transfer_to_human
    telephony:
      greeting: "Hello, thank you for calling Acme Support. How can I help you today?"
      fallback_message: "I'm having trouble understanding. Let me connect you with a specialist."
      max_silence_seconds: 5
      transfer_number: "+15551234567"

  chat_support:
    name: "Chat Support Agent"
    channel: chat
    llm_provider: openai
    llm_model: gpt-4o-mini
    temperature: 0.4
    max_tokens: 1024
    containment_target: 0.80
    llm:
      top_p: 0.95
      top_k: 50
      frequency_penalty: 0.2
      presence_penalty: 0.0
      n: 1
      stop_sequences: []
      chain_of_thought: true
      few_shot_enabled: true
    tools:
      - lookup_customer
      - search_knowledge_base
      - create_ticket
      - update_crm

  copilot:
    name: "Agent Copilot"
    channel: copilot
    llm_provider: openai
    llm_model: gpt-4o-mini
    temperature: 0.2
    max_tokens: 2048
    llm:
      top_p: 0.9
      top_k: 40
      frequency_penalty: 0.1
      presence_penalty: 0.0
      n: 2
      stop_sequences: ["---"]
      chain_of_thought: true
      few_shot_enabled: true
    tools:
      - search_knowledge_base
      - draft_response
      - summarize_conversation

llm_defaults:
  top_p: 1.0
  top_k: 40
  frequency_penalty: 0.0
  presence_penalty: 0.0
  n: 1
  stop_sequences: []
  chain_of_thought: false
  few_shot_enabled: true

guardrails:
  enabled: true
  block_prompt_injection: true
  sanitize_output: true

rag:
  chunk_size: 512
  chunk_overlap: 64
  top_k: 5
  score_threshold: 0.7

evaluation:
  metrics:
    - containment_rate
    - avg_response_time_ms
    - tool_accuracy
    - hallucination_rate
    - grounding_score
  test_suite: tests/evaluation/test_cases.json
  benchmark_suite: tests/evaluation/benchmarks.json
  hallucination_threshold: 0.15
