<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice Agents Platform</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --user-bubble: #1d4ed8;
      --agent-bubble: #243044;
      --success: #22c55e;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header h1 span { color: var(--accent); }
    .header-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.875rem;
      margin-left: 1rem;
    }
    .header-links a:hover { color: var(--accent); }
    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .status-dot.online { background: var(--success); box-shadow: 0 0 8px var(--success); }
    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      gap: 0;
      min-height: 0;
    }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    .sidebar label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 0.4rem;
    }
    select, input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
    }
    select:focus, input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .tabs {
      display: flex;
      gap: 0.5rem;
    }
    .tab {
      flex: 1;
      padding: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      text-align: center;
      transition: all 0.15s;
    }
    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .chat-area {
      display: flex;
      flex-direction: column;
      min-height: calc(100vh - 65px);
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .message {
      max-width: 80%;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      line-height: 1.5;
      font-size: 0.95rem;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user {
      align-self: flex-end;
      background: var(--user-bubble);
      border-bottom-right-radius: 4px;
    }
    .message.agent {
      align-self: flex-start;
      background: var(--agent-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message .meta {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    .welcome {
      text-align: center;
      color: var(--muted);
      padding: 3rem 1rem;
    }
    .welcome h2 { color: var(--text); margin-bottom: 0.5rem; font-size: 1.1rem; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-top: 1.5rem;
    }
    .suggestion {
      padding: 0.5rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .input-area {
      padding: 1rem 1.5rem 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: flex-end;
    }
    textarea {
      flex: 1;
      padding: 0.85rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      font-family: inherit;
    }
    button.send {
      padding: 0.85rem 1.5rem;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    button.send:hover { background: var(--accent-hover); }
    button.send:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing {
      align-self: flex-start;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0.5rem 0;
    }
    .message.system {
      align-self: center;
      max-width: 90%;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
    }
    .message.voice-agent {
      align-self: flex-start;
      background: #1a2e1a;
      border: 1px solid #2d5a2d;
      border-bottom-left-radius: 4px;
    }
    .message.voice-agent::before {
      content: "🔊 Agent says: ";
      font-size: 0.75rem;
      color: var(--success);
      display: block;
      margin-bottom: 0.25rem;
    }
    .voice-panel { display: none; }
    .voice-panel.active { display: block; }
    .chat-panel.hidden { display: none; }
    .call-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--success);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 0.5rem;
    }
    .call-btn:hover { filter: brightness(1.1); }
    .call-info {
      font-size: 0.75rem;
      color: var(--muted);
      padding: 0.5rem;
      background: var(--surface2);
      border-radius: 8px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>🎙️ <span>Voice Agents</span> Platform</h1>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking...</span>
    </div>
    <div class="header-links">
      <a href="/docs" target="_blank">API Docs</a>
      <a href="/redoc" target="_blank">ReDoc</a>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div>
        <label>Mode</label>
        <div class="tabs">
          <button class="tab active" data-mode="chat">Chat</button>
          <button class="tab" data-mode="copilot">Copilot</button>
          <button class="tab" data-mode="voice">Voice</button>
        </div>
      </div>
      <div id="chatSidebar">
        <div>
          <label>Agent</label>
          <select id="agentSelect">
            <option value="chat_support">Chat Support</option>
            <option value="voice_support">Voice Support</option>
            <option value="copilot">Agent Copilot</option>
          </select>
        </div>
        <div>
          <label>Session ID</label>
          <input type="text" id="sessionId" value="web-demo" />
        </div>
      </div>
      <div id="voiceSidebar" class="voice-panel">
        <div>
          <label>Caller Number (PSTN)</label>
          <input type="text" id="callerNumber" value="+15551234567" />
        </div>
        <div>
          <label>Call SID</label>
          <input type="text" id="callSid" value="SIM-CALL-001" />
        </div>
        <button class="call-btn" onclick="answerCall()">📞 Answer Incoming Call</button>
        <div class="call-info">
          Simulates Twilio PSTN → webhook → voice agent → TTS response. No phone account needed.
        </div>
      </div>
      <div id="copilotContext" style="display:none">
        <label>Conversation Summary (Copilot)</label>
        <input type="text" id="conversationSummary" placeholder="Paste transcript summary..." />
      </div>
      <button class="send" style="width:100%;margin-top:auto" onclick="clearChat()">Clear Chat</button>
    </aside>

    <main class="chat-area">
      <div class="messages" id="messages">
        <div class="welcome" id="welcome">
          <h2>Enterprise AI Agent Demo</h2>
          <p>Test chat, copilot, RAG, and CRM tools — no API keys required.</p>
          <div class="suggestions">
            <button class="suggestion" onclick="sendSuggestion('How do I reset my password?')">Reset password</button>
            <button class="suggestion" onclick="sendSuggestion('Can you look up jane@example.com?')">Lookup customer</button>
            <button class="suggestion" onclick="sendSuggestion('I need to speak to a manager')">Escalate to human</button>
            <button class="suggestion" onclick="sendSuggestion('My API calls return 403 errors')">API 403 error</button>
          </div>
        </div>
      </div>
      <div class="input-area chat-panel" id="chatInput">
        <div class="input-row">
          <textarea id="input" rows="1" placeholder="Type your message..." onkeydown="handleKey(event)"></textarea>
          <button class="send" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
      </div>
      <div class="input-area voice-panel" id="voiceInput">
        <div class="input-row">
          <textarea id="voiceInputText" rows="1" placeholder="What does the caller say? (speech-to-text)..." onkeydown="handleVoiceKey(event)"></textarea>
          <button class="send" id="voiceSendBtn" onclick="sendVoiceSpeech()">Speak</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = '/api/v1';
    let mode = 'chat';
    let callActive = false;

    function setMode(newMode) {
      mode = newMode;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));

      const chatSidebar = document.getElementById('chatSidebar');
      const voiceSidebar = document.getElementById('voiceSidebar');
      const chatInput = document.getElementById('chatInput');
      const voiceInput = document.getElementById('voiceInput');
      const copilotCtx = document.getElementById('copilotContext');
      const agent = document.getElementById('agentSelect');

      const isVoice = mode === 'voice';
      chatSidebar.style.display = isVoice ? 'none' : 'block';
      voiceSidebar.classList.toggle('active', isVoice);
      chatInput.classList.toggle('hidden', isVoice);
      voiceInput.classList.toggle('active', isVoice);
      copilotCtx.style.display = mode === 'copilot' ? 'block' : 'none';

      if (mode === 'copilot') agent.value = 'copilot';
      else if (mode === 'voice') { /* voice uses telephony endpoint */ }
      else agent.value = 'chat_support';

      if (isVoice && !callActive) {
        showVoiceWelcome();
      }
    }

    function showVoiceWelcome() {
      document.getElementById('messages').innerHTML = `
        <div class="welcome" id="welcome">
          <h2>📞 Voice Call Simulator</h2>
          <p>Simulates PSTN → Twilio/CCaaS → SIP webhook → AI voice agent</p>
          <div class="suggestions">
            <button class="suggestion" onclick="answerCall()">Answer incoming call</button>
            <button class="suggestion" onclick="sendVoiceSuggestion('How do I reset my password?')">Ask about password</button>
            <button class="suggestion" onclick="sendVoiceSuggestion('I need to speak to a manager')">Request transfer</button>
          </div>
        </div>`;
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        document.getElementById('statusDot').classList.add('online');
        document.getElementById('statusText').textContent = data.status === 'healthy' ? 'Online' : 'Degraded';
      } catch {
        document.getElementById('statusText').textContent = 'Offline';
      }
    }

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => setMode(tab.dataset.mode));
    });

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function sendSuggestion(text) {
      document.getElementById('input').value = text;
      sendMessage();
    }

    function clearChat() {
      callActive = false;
      if (mode === 'voice') showVoiceWelcome();
      else document.getElementById('messages').innerHTML = `
        <div class="welcome" id="welcome">
          <h2>Enterprise AI Agent Demo</h2>
          <p>Chat cleared. Start a new conversation.</p>
        </div>`;
    }

    function addMessage(text, role, meta = '') {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = text + (meta ? `<div class="meta">${meta}</div>` : '');
      document.getElementById('messages').appendChild(div);
      div.scrollIntoView({ behavior: 'smooth' });
    }

    async function sendMessage() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value = '';
      addMessage(text, 'user');

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.textContent = 'Agent is thinking...';
      document.getElementById('messages').appendChild(typing);

      const sessionId = document.getElementById('sessionId').value || 'web-demo';
      const agentId = document.getElementById('agentSelect').value;

      try {
        let res, data;
        if (mode === 'copilot') {
          res = await fetch(`${API}/copilot`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text,
              agent_id: agentId,
              conversation_summary: document.getElementById('conversationSummary').value,
            }),
          });
        } else {
          res = await fetch(`${API}/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              message: text,
              agent_id: agentId,
              session_id: sessionId,
            }),
          });
        }

        document.getElementById('typing')?.remove();
        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          const text = await res.text();
          throw new Error(text.slice(0, 200) || `Server error (${res.status})`);
        }
        data = await res.json();

        if (!res.ok) throw new Error(data.detail || 'Request failed');

        const response = data.response || JSON.stringify(data);
        const tools = (data.tool_calls || []).map(t => t.name).join(', ');
        const ms = data.metrics?.response_time_ms;
        const meta = [tools && `Tools: ${tools}`, ms && `${ms}ms`, data.metrics?.mode].filter(Boolean).join(' · ');

        addMessage(response, 'agent', meta);
      } catch (err) {
        document.getElementById('typing')?.remove();
        addMessage(`Error: ${err.message}`, 'agent');
      }

      btn.disabled = false;
      input.focus();
    }

    function handleVoiceKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendVoiceSpeech();
      }
    }

    function sendVoiceSuggestion(text) {
      if (!callActive) answerCall().then(() => {
        document.getElementById('voiceInputText').value = text;
        sendVoiceSpeech();
      });
      else {
        document.getElementById('voiceInputText').value = text;
        sendVoiceSpeech();
      }
    }

    async function answerCall() {
      callActive = true;
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      addMessage('📞 Incoming PSTN call...', 'system');
      return simulateVoice(null);
    }

    async function sendVoiceSpeech() {
      const input = document.getElementById('voiceInputText');
      const text = input.value.trim();
      if (!text) return;

      if (!callActive) {
        callActive = true;
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();
      }

      const btn = document.getElementById('voiceSendBtn');
      btn.disabled = true;
      input.value = '';
      addMessage(`🎤 Caller: "${text}"`, 'user');

      await simulateVoice(text);
      btn.disabled = false;
      input.focus();
    }

    async function simulateVoice(speech) {
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.id = 'typing';
      typing.textContent = 'Processing speech via voice webhook...';
      document.getElementById('messages').appendChild(typing);

      try {
        const res = await fetch(`${API}/telephony/simulate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            call_sid: document.getElementById('callSid').value || 'SIM-CALL-001',
            from_number: document.getElementById('callerNumber').value || '+15551234567',
            speech: speech,
          }),
        });
        document.getElementById('typing')?.remove();
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || 'Simulation failed');

        if (data.agent_says) {
          addMessage(data.agent_says, 'voice-agent');
        }

        const metaParts = [];
        if (data.listening) metaParts.push('Listening for speech');
        if (data.transfer_to) metaParts.push(`Transfer → ${data.transfer_to}`);
        if (data.routing?.destination) metaParts.push(`Route → ${data.routing.destination}`);
        if (data.call_actions?.length) metaParts.push(data.call_actions.join(' | '));

        if (metaParts.length) {
          addMessage(`Telephony: ${metaParts.join(' · ')}`, 'system');
        }
      } catch (err) {
        document.getElementById('typing')?.remove();
        addMessage(`Error: ${err.message}`, 'agent');
      }
    }

    checkHealth();
    document.getElementById('input').focus();
  </script>
</body>
</html>
