name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  REGISTRY: ghcr.io
  IMAGE_NAME: shubhamrsy/nexus-ai

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: project
      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/
        working-directory: project
      - name: Type check with mypy
        run: mypy src/
        working-directory: project

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" bandit pip-audit
        working-directory: project
      - name: SAST with bandit
        run: bandit -c bandit.yaml -r src/ -ll -q
        working-directory: project
      - name: Dependency audit with pip-audit
        run: |
          python scripts/audit_deps.py /tmp/requirements-audit.txt
          # PYSEC-2026-311: Chroma FastAPI server RCE when exposed publicly — no fix >1.5.9 on PyPI.
          # Nexus uses embedded PersistentClient by default (chroma_server_url empty).
          pip-audit --strict -r /tmp/requirements-audit.txt --ignore-vuln PYSEC-2026-311
        working-directory: project

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus
          POSTGRES_PASSWORD: nexus
          POSTGRES_DB: nexus
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: project
      - name: Ingest knowledge base
        run: python scripts/ingest_kb.py data/knowledge_base/
        working-directory: project
      - name: Run unit & integration tests (SQLite)
        run: >
          pytest tests/
          --ignore=tests/e2e
          --ignore=tests/reports
          --ignore=tests/test_comprehensive_e2e.py
          -v --cov=src --cov-report=xml --cov-report=term --timeout=60
        working-directory: project
      - name: Verify PostgreSQL connection & migration
        env:
          DATABASE_URL: postgresql://nexus:nexus@localhost:5432/nexus
        run: |
          python -c "
          import sys, traceback
          try:
              from src.config import get_settings
              s = get_settings()
              assert 'postgresql' in s.database_url, f'Expected postgresql URL, got {s.database_url}'
              from src.database import init_db, _get_pg_pool, _SCHEMA_VERSION
              init_db()
              pool = _get_pg_pool()
              conn = pool.getconn()
              with conn.cursor() as cur:
                  cur.execute('SELECT version FROM _schema_version')
                  row = cur.fetchone()
                  assert row is not None, 'Schema version not set'
                  assert row[0] >= _SCHEMA_VERSION, f'Expected schema version >= {_SCHEMA_VERSION}, got {row[0]}'
              pool.putconn(conn)
              print('PostgreSQL connection OK, schema version', row[0])
          except Exception:
              traceback.print_exc()
              sys.exit(1)
          "
        working-directory: project
      - name: Run LLM E2E (if API keys set)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ] && [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "No API keys set, skipping LLM E2E"
            exit 0
          fi
          python -m uvicorn src.main:app --host 127.0.0.1 --port 8002 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8002/api/v1/health && break
            sleep 1
          done
          pytest tests/test_comprehensive_e2e.py -v --timeout=120 -k "llm_or_live" || true
          kill $SERVER_PID 2>/dev/null || true
        working-directory: project
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./project/coverage.xml
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
        working-directory: project
      - name: Ingest knowledge base
        run: python scripts/ingest_kb.py data/knowledge_base/
        working-directory: project
      - name: Run E2E + live server tests
        env:
          DEMO_MODE: "true"
        run: |
          set -e
          python -m uvicorn src.main:app --host 127.0.0.1 --port 8001 &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8001/api/v1/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8001/api/v1/health || { echo "Server failed to start"; kill $SERVER_PID 2>/dev/null; exit 1; }
          pytest tests/e2e/ -v --timeout=120 --reruns 2
          pytest tests/test_comprehensive_e2e.py -v --timeout=120 --reruns 2
          kill $SERVER_PID 2>/dev/null || true
        working-directory: project

  publish:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: project
          file: project/deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Smoke test Docker image
        run: |
          docker run -d -p 8000:8000 --name nexus-test \
            -e CORS_ORIGINS=http://127.0.0.1:8000,http://localhost:8000 \
            -e JWT_SECRET=ci-smoke-test-jwt-secret-do-not-use-in-prod \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "Smoke test passed"
              docker stop nexus-test && docker rm nexus-test
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          docker logs nexus-test 2>&1 || true
          docker stop nexus-test 2>/dev/null || true
          docker rm nexus-test 2>/dev/null || true
          exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [publish, e2e]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Verify deploy secrets
        run: |
          missing=""
          [ -z "${{ secrets.DEPLOY_HOST }}" ] && missing="DEPLOY_HOST"
          [ -z "${{ secrets.DEPLOY_USER }}" ] && missing="${missing:+$missing, }DEPLOY_USER"
          [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ] && missing="${missing:+$missing, }DEPLOY_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Actions secrets: $missing"
            echo "Set them at: Settings → Secrets and variables → Actions"
            echo "DEPLOY_HOST = VPS public IP or domain (e.g. yournexus.duckdns.org)"
            exit 1
          fi
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          timeout: 120s
          command_timeout: 10m
          script: |
            export COMPOSE_FILE=/opt/nexus/project/deploy/docker/docker-compose.yml
            cd /opt/nexus/project && git pull
            docker compose pull nexus
            docker compose up -d --no-deps nexus --force-recreate
            docker image prune -f

  publish-staging:
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push staging Docker image
        uses: docker/build-push-action@v6
        with:
          context: project
          file: project/deploy/docker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [publish-staging, e2e]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - name: Deploy to staging VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER_STAGING }}
          key: ${{ secrets.DEPLOY_SSH_KEY_STAGING }}
          script: |
            export COMPOSE_FILE=/opt/nexus/project/deploy/docker/docker-compose.yml:/opt/nexus/project/deploy/docker/docker-compose.staging.yml
            cd /opt/nexus/project && git pull
            docker compose pull nexus
            docker compose up -d --no-deps nexus
            docker image prune -f
