# Automated test pipeline — runs on every push and pull request.
# Unit · E2E · non-functional tests via PyTest (mock/offline mode, no API keys).

name: CI

on:
  push:
    branches: [main, develop, platform]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  # ── Fast unit & integration tests ─────────────────────────────────────────
  unit:
    name: Unit & integration (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit & integration tests
        env:
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/reports \
            -v --tb=short \
            --junitxml=junit-unit.xml \
            --cov=src \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-unit-py${{ matrix.python-version }}
          path: junit-unit.xml
          retention-days: 14

      - name: Upload unit coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-py${{ matrix.python-version }}
          path: coverage-unit.xml
          retention-days: 14

  # ── E2E & non-functional tests ────────────────────────────────────────────
  e2e:
    name: E2E & non-functional (Python 3.12)
    runs-on: ubuntu-latest
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run E2E and non-functional tests
        env:
          OPENAI_API_KEY: ""
          ANTHROPIC_API_KEY: ""
        run: |
          pytest tests/e2e/ \
            -v --tb=short \
            --junitxml=junit-e2e.xml \
            --cov=src \
            --cov-append \
            --cov-report=xml:coverage-full.xml \
            --cov-report=term-missing

      - name: Publish E2E test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: E2E & NFR (Python 3.12)
          path: junit-e2e.xml
          reporter: java-junit
          fail-on-error: true

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-e2e
          path: |
            junit-e2e.xml
            coverage-full.xml
          retention-days: 14

  # ── Docker build + smoke test ─────────────────────────────────────────────
  docker:
    name: Docker build & smoke
    runs-on: ubuntu-latest
    needs: [unit, e2e]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t voice-agents:ci .

      - name: Smoke test container
        run: |
          docker run -d --name voice-agents-ci -p 18000:8000 \
            -e OPENAI_API_KEY= \
            -e ANTHROPIC_API_KEY= \
            voice-agents:ci
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:18000/api/v1/health; then
              echo "Health check passed"
              curl -sf http://127.0.0.1:18000/ | head -c 200
              exit 0
            fi
            sleep 2
          done
          docker logs voice-agents-ci
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f voice-agents-ci 2>/dev/null || true
