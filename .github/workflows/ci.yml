name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy
      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --allow-untyped-decorators || true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ingest knowledge base
        run: python scripts/ingest_kb.py data/knowledge_base/
      - name: Run unit tests
        run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=term --timeout=60
      - name: Run E2E tests
        run: pytest tests/e2e/ -v --timeout=120
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t nexus-voice-agents .
      - name: Smoke test Docker image
        run: |
          docker run -d -p 8000:8000 --name nexus-test nexus-voice-agents
          sleep 5
          curl -s http://localhost:8000/api/v1/health | grep -q "healthy"
          echo "Docker smoke test passed"
          docker stop nexus-test
          docker rm nexus-test
