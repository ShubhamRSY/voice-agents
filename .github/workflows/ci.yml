name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ruff mypy
      - name: Lint with ruff
        run: ruff check src/ tests/ scripts/
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --allow-untyped-decorators
      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit --strict --skip-pkg enterprise-voice-agents

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ingest knowledge base
        run: python scripts/ingest_kb.py data/knowledge_base/
      - name: Run unit & integration tests
        run: >
          pytest tests/
          --ignore=tests/e2e
          --ignore=tests/reports
          --ignore=tests/test_comprehensive_e2e.py
          -v --cov=src --cov-report=xml --cov-report=term --timeout=60
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ingest knowledge base
        run: python scripts/ingest_kb.py data/knowledge_base/
      - name: Run E2E + live server tests
        run: |
          set -e
          # Start server in background
          python -m uvicorn src.main:app --host 127.0.0.1 --port 8001 &
          SERVER_PID=$!
          # Wait for server
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8001/api/v1/health > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8001/api/v1/health || { echo "Server failed to start"; kill $SERVER_PID 2>/dev/null; exit 1; }
          # Run e2e tests + live comprehensive tests (retry flaky once)
          pytest tests/e2e/ -v --timeout=120 --reruns 2
          pytest tests/test_comprehensive_e2e.py -v --timeout=120 --reruns 2
          # Cleanup
          kill $SERVER_PID 2>/dev/null || true

  docker:
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f deploy/docker/Dockerfile -t nexus-voice-agents .
      - name: Smoke test Docker image
        run: |
          docker run -d -p 8000:8000 --name nexus-test nexus-voice-agents
          sleep 5
          curl -s http://localhost:8000/api/v1/health | grep -q "healthy"
          echo "Docker smoke test passed"
          docker stop nexus-test
          docker rm nexus-test
